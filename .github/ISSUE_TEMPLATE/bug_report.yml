name: Bug Report
description: Report a bug or unexpected behavior in Cortex
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this. Please fill out the fields below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: The exact steps to trigger the bug.
      placeholder: |
        1. Run `cortex init` in a project
        2. Start a Claude Code session
        3. ...
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened instead?
    validations:
      required: true

  - type: input
    id: cortex-version
    attributes:
      label: Cortex Version
      description: Run `cortex --version` and paste the output.
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: e.g. macOS 15.3, Ubuntu 24.04, Windows 11
      placeholder: "macOS 15.3"
    validations:
      required: true

  - type: input
    id: claude-code-version
    attributes:
      label: Claude Code Version
      description: Run `claude --version` and paste the output.
      placeholder: "1.0.0"
    validations:
      required: false

  - type: dropdown
    id: install-method
    attributes:
      label: Installation Method
      options:
        - Homebrew (brew install cortex-memory)
        - npx (@cortex.memory/cli init)
        - curl (install script)
        - Built from source
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste output from `cortex logs` or `cortex doctor`. This will be rendered as code.
      render: shell
    validations:
      required: false
